name: Wentra - Akıllı Java Derleme Sistemi

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    name: JAR Üretim Süreci
    runs-on: ubuntu-latest
    
    steps:
    - name: 1. Depoyu Klonla
      uses: actions/checkout@v4

    - name: 2. JDK 8 ve JavaFX Kurulumu
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'zulu'
        java-package: jdk+fx

    - name: 3. Otomatik Yol Tespiti ve Derleme
      run: |
        echo "--> Java dosyaları taranıyor..."
        # Depodaki tüm .java dosyalarını bulur
        find . -name "*.java" > sources.txt
        
        if [ ! -s sources.txt ]; then
          echo "::error:: HATA: Deponuzda hiçbir .java dosyası yok! Lütfen Java kodlarınızı (src klasörünü) GitHub'a yükleyin efendim."
          exit 1
        fi

        mkdir -p out/classes out/staging
        
        # Kütüphaneleri bul
        LIBS=$(find . -name "*.jar" | tr '\n' ':')
        
        echo "--> Derleme başlatılıyor..."
        javac -cp "$LIBS" -d out/classes @sources.txt

        echo "--> Paketleme (Java Agent Formatı)..."
        cd out/staging
        # Kütüphaneleri JAR içine göm
        find ../.. -name "*.jar" -exec jar xf {} \;
        rm -rf META-INF/*.RSA META-INF/*.SF META-INF/*.DSA META-INF/MANIFEST.MF
        cp -r ../classes/* .
        
        # BAN RISKINI SIFIRLAYAN AGENT AYARI
        printf "Manifest-Version: 1.0\nMain-Class: wentra.Main\nPremain-Class: wentra.Main\nAgent-Class: wentra.Main\nCan-Retransform-Classes: true\n\n" > manifest.txt

        jar cvfm ../../WentraClient.jar manifest.txt .
        echo "İşlem tamamlandı efendim!"

    - name: 4. JAR'ı Yayınla
      uses: actions/upload-artifact@v4
      with:
        name: WentraClient
        path: WentraClient.jar
