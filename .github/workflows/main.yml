name: Wentra - Profesyonel Java Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 1. Kodları Çek
      uses: actions/checkout@v4

    - name: 2. JDK 8 ve JavaFX Kur (Zulu)
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'zulu'
        java-package: jdk+fx

    - name: 3. Derle ve Paketle
      run: |
        # Klasörleri hazırla
        mkdir -p out/classes out/staging
        
        # src klasörünü bul ve içindeki tüm java dosyalarını listele
        SRC_PATH=$(find . -name "src" -type d -print -quit)
        if [ -z "$SRC_PATH" ]; then
          echo "HATA: Depoda 'src' klasörü bulunamadı efendim!"
          exit 1
        fi
        find "$SRC_PATH" -name "*.java" > sources.txt
        
        # Kütüphaneleri (libraries) bul ve derle
        LIB_PATH=$(find . -name "libraries" -type d -print -quit)
        CP="."
        [ -d "$LIB_PATH" ] && CP="$LIB_PATH/*"
        
        javac -cp "$CP" -d out/classes @sources.txt
        
        # JAR Hazırlığı (Ajan Özellikleri)
        cd out/staging
        [ -d "../../$LIB_PATH" ] && for jar in ../../$LIB_PATH/*.jar; do jar xf "$jar"; done
        rm -rf META-INF # Temiz başlangıç
        cp -r ../classes/* .
        
        # BAN KORUMASI İÇİN AGENT MANIFESTI
        echo "Manifest-Version: 1.0" > manifest.txt
        echo "Main-Class: wentra.Main" >> manifest.txt
        echo "Premain-Class: wentra.Main" >> manifest.txt
        echo "Agent-Class: wentra.Main" >> manifest.txt
        echo "Can-Retransform-Classes: true" >> manifest.txt
        echo "" >> manifest.txt # Boş satır şart

        jar cvfm ../../WentraClient.jar manifest.txt .

    - name: 4. JAR'ı Yayınla
      uses: actions/upload-artifact@v4
      with:
        name: WentraClient
        path: WentraClient.jar
