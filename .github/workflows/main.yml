name: Wentra - Arşiv Dedektifi ve Derleme

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 1. Depoyu Klonla
      uses: actions/checkout@v4

    - name: 2. Dosya Listeleme (Teşhis Adımı)
      # Efendim, burada deponuzda gerçekte ne var ne yok her şeyi göreceğiz.
      run: |
        echo "--- Depo İçeriği Tam Liste ---"
        ls -laR
        echo "-----------------------------"

    - name: 3. Unrar Kurulumu
      run: sudo apt-get install unrar -y

    - name: 4. RAR'ı Bul ve Ayıkla (Gelişmiş Filtre)
      run: |
        # İsmi ne olursa olsun içindeki ilk .rar dosyasını bulur
        RAR_FILE=$(find . -maxdepth 2 -name "*.rar" -print -quit)
        
        if [ -z "$RAR_FILE" ]; then
          echo "HATA: Depoda hala .rar bulunamadı. Lütfen dosyayı GitHub'a yüklediğinizden emin olun!"
          exit 1
        fi
        
        echo "Dosya Bulundu: $RAR_FILE"
        # Boşluklu isimler için tırnak işareti kullanarak ayıkla
        unrar x "$RAR_FILE"

    - name: 5. JDK 8 ve Derleme Başlat
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'zulu'
        java-package: jdk+fx

    - name: 6. JAR Oluşturma
      run: |
        mkdir -p build/classes build/staging
        find . -name "*.java" > sources.txt
        
        # Kütüphaneleri otomatik topla
        LIBS=$(find . -name "*.jar" | tr '\n' ':')
        javac -cp "$LIBS" -d build/classes @sources.txt
        
        # Paketleme (Java Agent Manifesti Dahil)
        cd build/staging
        find ../.. -name "*.jar" -exec jar xf {} \;
        rm -rf META-INF/*.RSA META-INF/*.SF META-INF/*.DSA META-INF/MANIFEST.MF
        cp -r ../classes/* .
        
        echo "Manifest-Version: 1.0" > manifest.txt
        echo "Main-Class: wentra.Main" >> manifest.txt
        echo "Premain-Class: wentra.Main" >> manifest.txt
        echo "Agent-Class: wentra.Main" >> manifest.txt
        echo "Can-Retransform-Classes: true" >> manifest.txt
        echo "" >> manifest.txt

        jar cvfm ../../WentraClient.jar manifest.txt .

    - name: 7. Çıktıyı Yayınla
      uses: actions/upload-artifact@v4
      with:
        name: Wentra-Agent-JAR
        path: WentraClient.jar
