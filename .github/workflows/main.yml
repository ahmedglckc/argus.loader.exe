name: Wentra - Profesyonel Java Agent Derleme Sistemi

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    name: Wentra Client Derleme Süreci
    runs-on: ubuntu-latest
    
    steps:
    - name: 1. Kaynak Kodları Klonla
      uses: actions/checkout@v4

    - name: 2. JDK 8 ve JavaFX Kurulumu (Zulu jdk+fx)
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'zulu'
        java-package: jdk+fx

    - name: 3. Depo Yapısını İncele (Hata Ayıklama)
      # Efendim, burada 'ls -R' yaparak tüm dosyaları listeliyoruz. 
      # Eğer loglarda sadece bir .rar görüyorsak, klasör bulunamadı hatasının sebebi budur.
      run: |
        echo "--- Depo İçeriği Listeleniyor ---"
        ls -R
        echo "-------------------------------"

    - name: 4. Akıllı Derleme ve Ajan Paketleme
      run: |
        echo "--> Adım 1: Java kaynak kodları taranıyor..."
        # Tüm .java dosyalarını bulup listeye ekler
        find . -name "*.java" > sources.txt
        
        if [ ! -s sources.txt ]; then
          echo "Kritik Hata: Hiçbir .java dosyası bulunamadı! Efendim, lütfen kodlarınızı deponuza klasör olarak yüklediğinizden emin olun (RAR olarak değil)."
          exit 1
        fi

        echo "--> Adım 2: Kütüphaneler (.jar) taranıyor..."
        # Projenizdeki tüm kütüphaneleri bulup classpath'e ekler
        LIBS=$(find . -name "*.jar" | tr '\n' ':')
        echo "Kullanılan Kütüphaneler: $LIBS"

        mkdir -p out/classes
        mkdir -p out/staging

        echo "--> Adım 3: Derleme başlatılıyor..."
        javac -cp "$LIBS" -d out/classes @sources.txt

        echo "--> Adım 4: Kütüphaneler tek bir JAR'da birleştiriliyor..."
        cd out/staging
        # Bulunan tüm JAR'ları açıp sınıflarını kopyalarız
        find ../.. -name "*.jar" -exec jar xf {} \;
        
        # İmza çakışmalarını önlemek için güvenlik temizliği
        rm -rf META-INF/*.RSA META-INF/*.SF META-INF/*.DSA META-INF/MANIFEST.MF
        
        echo "--> Adım 5: Derlenen kodlar ekleniyor..."
        cp -r ../classes/* .
        
        echo "--> Adım 6: Java Agent Manifesti oluşturuluyor..."
        # Bu kısım hilenin ban riskini en aza indirir efendim.
        echo "Manifest-Version: 1.0" > manifest.txt
        echo "Main-Class: wentra.Main" >> manifest.txt
        echo "Premain-Class: wentra.Main" >> manifest.txt
        echo "Agent-Class: wentra.Main" >> manifest.txt
        echo "Can-Retransform-Classes: true" >> manifest.txt
        echo "Can-Redefine-Classes: true" >> manifest.txt
        echo "" >> manifest.txt

        echo "--> Adım 7: Nihai WentraClient.jar paketleniyor..."
        jar cvfm ../../WentraClient.jar manifest.txt .
        
        echo "İşlem başarıyla tamamlandı efendim!"

    - name: 5. Oluşan JAR Dosyasını Yükle
      uses: actions/upload-artifact@v4
      with:
        name: Wentra-Build-Success
        path: WentraClient.jar
