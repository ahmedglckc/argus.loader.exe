name: Wentra - Sabit Yol Derleme Sistemi

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 1. Depoyu Klonla
      uses: actions/checkout@v4

    - name: 2. JDK 8 ve JavaFX Kurulumu
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'zulu'
        java-package: jdk+fx

    - name: 3. Doğrudan Derleme (Hardcoded Paths)
      run: |
        # Klasörleri oluştur
        mkdir -p out/classes out/staging
        
        # EL İLE BELİRTİLEN YOLLAR (Burayı klasör ismine göre düzenleyin)
        SRC_DIR="WentraReborn-CraftRise/src"
        LIB_DIR="WentraReborn-CraftRise/libraries"

        echo "--> Belirtilen yoldaki dosyalar derleniyor: $SRC_DIR"
        
        # Java dosyalarını listele (Arasız, direkt yol üzerinden)
        find $SRC_DIR -name "*.java" > sources.txt
        
        # Derleme başlat (Kütüphanelerle birlikte)
        javac -cp "$LIB_DIR/*" -d out/classes @sources.txt

        # Paketleme (Java Agent Formatı)
        cd out/staging
        for f in ../../$LIB_DIR/*.jar; do jar xf "$f"; done
        rm -rf META-INF/MANIFEST.MF
        cp -r ../classes/* .
        
        # Java Agent Manifesti
        printf "Manifest-Version: 1.0\nMain-Class: wentra.Main\nPremain-Class: wentra.Main\nAgent-Class: wentra.Main\nCan-Retransform-Classes: true\n\n" > manifest.txt

        jar cvfm ../../WentraClient.jar manifest.txt .

    - name: 4. JAR'ı Yayınla
      uses: actions/upload-artifact@v4
      with:
        name: WentraClient
        path: WentraClient.jar
